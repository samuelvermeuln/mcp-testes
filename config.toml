[server]
name = "digital-solutions-test-mcp"
transport = "streamable-http"

[project]
# Deixe vazio para auto-deteccao inteligente do projeto.
project_root = ""

[context]
mode = "isolated"
store_root = "/data/contexts"
developer_id = "server"
workspace_id = "default"

[memory]
# Persistencia local para RAG/token optimization.
enabled = true
chunk_chars = 1200
chunk_overlap_chars = 180
default_max_chunks = 8
default_max_chars = 7000
