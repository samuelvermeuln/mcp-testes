[server]
name = "digital-solutions-test-mcp"
transport = "sse"
host = "0.0.0.0"
port = 8000
sse_path = "/sse"
message_path = "/messages/"
streamable_http_path = "/mcp"
stateless_http = true
json_response = true

[server.security]
# Public MCP server: libera conexoes externas de Claude, Codex e Copilot.
enable_dns_rebinding_protection = false
allowed_hosts = ["*"]
allowed_origins = ["*"]

[project]
# Deixe vazio para auto-deteccao inteligente do projeto.
project_root = ""

[context]
mode = "isolated"
store_root = "/data/contexts"
developer_id = "server"
workspace_id = "default"

[router]
# Roteador de projeto: escolhe projeto por intent e mantem binding por contexto/dev/workspace.
prefer_llm = true
# provider: "openai", "anthropic" ou vazio para usar fallback heuristico.
provider = ""
# Ex.: "gpt-4.1-mini" ou "claude-3-5-haiku-latest"
model = ""
# Opcional: comando externo para resolver projeto via LLM (recebe JSON no stdin e retorna JSON no stdout).
resolver_command = ""
# Raiz onde os projetos de API ficam montados no servidor.
projects_root = "/workspace/projects"
# Limite de candidatos enviados ao roteador para reduzir tokens.
max_candidates = 40

[memory]
# Persistencia local para RAG/token optimization.
enabled = true
chunk_chars = 1200
chunk_overlap_chars = 180
default_max_chunks = 8
default_max_chars = 7000
