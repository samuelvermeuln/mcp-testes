services:
  digital-solutions-test-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${IMAGE_NAME:-ghcr.io/samuelvermeuln/mcp-testes}:${IMAGE_TAG:-latest}
    container_name: ${CONTAINER_NAME:-digital-solutions-test-mcp}
    restart: unless-stopped
    ports:
      - "${MCP_PORT:-8000}:8000"
    environment:
      DIGITAL_SOLUTIONS_MCP_TRANSPORT: ${DIGITAL_SOLUTIONS_MCP_TRANSPORT:-streamable-http}
      DIGITAL_SOLUTIONS_MCP_HOST: 0.0.0.0
      DIGITAL_SOLUTIONS_MCP_PORT: "8000"
      DIGITAL_SOLUTIONS_MCP_PATH: ${DIGITAL_SOLUTIONS_MCP_PATH:-/mcp}
      DIGITAL_SOLUTIONS_MCP_STATELESS_HTTP: ${DIGITAL_SOLUTIONS_MCP_STATELESS_HTTP:-true}
      DIGITAL_SOLUTIONS_MCP_JSON_RESPONSE: ${DIGITAL_SOLUTIONS_MCP_JSON_RESPONSE:-true}
      DIGITAL_SOLUTIONS_MCP_CONFIG_TOML: ${DIGITAL_SOLUTIONS_MCP_CONFIG_TOML:-/app/config.toml}
      DIGITAL_SOLUTIONS_PROJECT_ROOT: ${DIGITAL_SOLUTIONS_PROJECT_ROOT:-}
    volumes:
      - ${MCP_DATA_DIR:-./data}:/data
      - ${PROJECTS_ROOT:-./projects}:/workspace/projects
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import json, urllib.request; data=json.load(urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)); assert data.get('status')=='ok'",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
